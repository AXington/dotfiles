[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors = true

[colors.bright]
black = "0x848484"
blue = "0x6666ff"
cyan = "0x2fffff"
green = "0x2fff2f"
magenta = "0xff2fff"
red = "0xff2f2f"
white = "0xffffff"
yellow = "0xffff2f"

[colors.normal]
black = "0x000000"
blue = "0x5959d9"
cyan = "0x00cdcd"
green = "0x19cd19"
magenta = "0xcd00cd"
red = "0xcd1919"
white = "0xffffff"
yellow = "0xcdcd00"

[colors.primary]
background = "0x000000"
foreground = "0xffffff"

[cursor]
style = {shape = "Block"}
unfocused_hollow = true

[font]
normal = {family = "Meslo LG M for Powerline", style = "Bold"}
size = 13.5
builtin_box_drawing = true

[general]
live_config_reload = true

[window]
padding = {x = 5, y = 5}
dynamic_padding = true
opacity = 1
